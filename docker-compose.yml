services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docanalyzer
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d docanalyzer']
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./ai-service
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://app:secret@postgres:5432/docanalyzer
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      PORT: '3000'
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started

  frontend:
    build: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:80'
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
