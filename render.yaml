databases:
  - name: docanalyzer-db
    plan: free
    databaseName: docanalyzer
    user: app

services:
  - type: web
    name: docanalyzer-ai
    runtime: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0

  - type: web
    name: docanalyzer-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docanalyzer-db
          property: connectionString
      - key: AI_SERVICE_URL
        fromService:
          name: docanalyzer-ai
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 20.18.0
